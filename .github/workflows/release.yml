name: release

# Publish stage: tag a v* (or trigger manually) → GitHub Release with
# per-target tarball/zip + per-archive sha256 + top-level SHA256SUMS.
#
# Splits cleanly with build-and-test.yml (ljh-sh dist regime).
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest,    os: linux,   libc: musl, docker_arch: amd64 }
          - { target: aarch64-linux-musl, runner: ubuntu-24.04-arm, os: linux,   libc: musl, docker_arch: arm64 }
          - { target: aarch64-macos,      runner: macos-14,         os: macos                 }
          - { target: x86_64-macos,       runner: macos-14,         os: macos                 }
          - { target: x86_64-windows,     runner: windows-latest,   os: windows               }
    continue-on-error: true
    # All matrix entries are best-effort for v0.2.x. The release
    # job (below) fires regardless of which entries succeed — the
    # SHA256SUMS + cosign signatures only cover the per-target
    # artefacts that did build. Known-not-building entries as of
    # 2026-07-15: aarch64-macos / aarch64-linux-musl (Alpine deps
    # drift + ICU build time), x86_64-windows (MSYS2 mingw64
    # package gap).
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux gnu)
        if: matrix.libc == 'musl'
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool

      - name: Install deps (macOS)
        if: matrix.os == 'macos'
        run: |
          brew update
          brew install autoconf automake libtool pkg-config

      - name: Install deps (Windows MSYS2 + mingw64)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git autoconf automake libtool
            make base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libtool

      - name: Build + smoke on Alpine (musl)
        if: matrix.libc == 'musl'
        run: docker run --rm --platform linux/${{ matrix.docker_arch }} -v "$PWD":/w -w /w alpine:3.20 sh -c 'apk add --no-cache bash autoconf automake libtool make g++ linux-headers texinfo >/dev/null && bash /w/scripts/build-alpine.sh && bash /w/scripts/smoke.sh'

      - name: Build (macOS — host)
        if: matrix.os == 'macos' && matrix.target == 'aarch64-macos'
        run: bash scripts/build.sh

      - name: Build (macOS x86_64 — cross-compile)
        if: matrix.target == 'x86_64-macos'
        env:
          DWDIFF_TARGET_ARCH: x86_64
          DWDIFF_TARGET_OS: apple-darwin
          DWDIFF_OS_HINT: darwin
        run: bash scripts/build.sh

      - name: Build (Windows x86_64 — msys2 bash)
        if: matrix.os == 'windows' && matrix.target == 'x86_64-windows'
        shell: msys2 {0}
        env:
          DWDIFF_TARGET_ARCH: x86_64
          DWDIFF_TARGET_OS: mingw32
          DWDIFF_OS_HINT: windows
        run: bash scripts/build.sh

      - name: Smoke test on host (gnu / macos)
        if: matrix.os != 'windows' && matrix.libc != 'musl'
        run: bash scripts/smoke.sh

      - name: Package (Linux / macOS)
        if: matrix.os != 'windows'
        run: TARGET=${{ matrix.target }} bash scripts/package.sh

      - name: Package (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          TARGET: ${{ matrix.target }}
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dwdiff-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    # Fire whenever the build job completes (any outcome other
    # than cancellation). Same ljh-sh dist regime v0.2.x policy
    # as ljh-sh/wdiff. See that file for the full rationale.
    if: startsWith(github.ref, 'refs/tags/v') && always() && needs.build.result != 'cancelled'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # upload release assets + create the release
      id-token: write       # cosign keyless OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 \
            | xargs -0 sha256sum | sed 's|^\([^ ]*\)  \./|\1  |' > SHA256SUMS
          cat SHA256SUMS

      # ---- cosign keyless signing -----------------------------------
      # See ljh-sh/wdiff/.github/workflows/release.yml for the full
      # rationale. In short: cosign sign-blob in keyless mode uses
      # the GitHub Actions OIDC token (via `id-token: write`) to
      # issue a Fulcio cert and post a Rekor transparency-log entry
      # per artefact. Verifiers check the cert's identity matches
      # `github.com/ljh-sh/dwdiff` and the OIDC issuer is
      # `https://token.actions.githubusercontent.com`.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # See wdiff release.yml for the v2.6.3 rationale. Pin
          # the v2 line — v3's --bundle-file API change broke
          # our --output-signature/--output-certificate flow.
          cosign-release: 'v2.6.3'
      - name: Sign release artefacts (keyless, OIDC)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          cd dist
          for f in $(find . -type f \( -name '*.tar.gz' -o -name '*.zip' \)); do
            echo "==> signing $f"
            cosign sign-blob --yes --output-signature "${f}.sig" --output-certificate "${f}.cert" "$f"
          done
          echo "==> cosign signing done"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sig
            dist/*.tar.gz.cert
            dist/*.zip
            dist/*.zip.sig
            dist/*.zip.cert
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            x eget ljh-sh/dwdiff
            ```

            Or download a per-target tarball, verify with the SHA256SUMS file,
            and (in v0.2.0+) verify the cosign keyless signature:

            ```bash
            curl -L -O https://github.com/ljh-sh/dwdiff/releases/latest/download/dwdiff-x86_64-linux-musl.tar.gz
            curl -L -O https://github.com/ljh-sh/dwdiff/releases/latest/download/dwdiff-x86_64-linux-musl.tar.gz.sig
            curl -L -O https://github.com/ljh-sh/dwdiff/releases/latest/download/dwdiff-x86_64-linux-musl.tar.gz.cert
            curl -L -O https://github.com/ljh-sh/dwdiff/releases/latest/download/dwdiff-x86_64-linux-musl.tar.gz.sha256
            sha256sum -c dwdiff-x86_64-linux-musl.tar.gz.sha256
            cosign verify-blob \
              --certificate-identity-regexp 'github.com/ljh-sh/dwdiff' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              dwdiff-x86_64-linux-musl.tar.gz \
              dwdiff-x86_64-linux-musl.tar.gz.sig \
              dwdiff-x86_64-linux-musl.tar.gz.cert
            ```

            See [dwdiff.ljh.sh](https://dwdiff.ljh.sh/) for the full
            install walkthrough, tldr examples, and security audit.
